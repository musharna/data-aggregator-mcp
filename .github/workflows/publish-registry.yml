name: Publish to MCP Registry
# Submits server.json to the official MCP registry via GitHub Actions OIDC
# (mcp-publisher login github-oidc) — no device flow, no stored credentials.
# The OIDC token's repository_owner ("musharna") grants the io.github.musharna/*
# namespace. Fires automatically on a published release, and can be triggered
# manually (workflow_dispatch) to (re)publish the current version — e.g. to
# backfill a release whose registry step was not yet automated.
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  registry-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for mcp-publisher login github-oidc
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Wait for the PyPI release to be queryable
        # publish.yml uploads to PyPI in a parallel run; the registry validates
        # the PyPI package + its mcp-name marker, so block until it is live.
        run: |
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/data-aggregator-mcp/$VER/json" >/dev/null; then
              echo "PyPI $VER is live"; exit 0
            fi
            echo "waiting for PyPI $VER ($i/30)"; sleep 10
          done
          echo "PyPI $VER did not appear within 5 minutes"; exit 1
      - name: Install mcp-publisher
        # Pinned to v1.7.9; bump alongside registry server.json schema changes.
        # sha256 verified: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" -o /tmp/mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  /tmp/mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f /tmp/mcp-publisher.tar.gz mcp-publisher
      - name: Log in to the MCP registry via GitHub Actions OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
