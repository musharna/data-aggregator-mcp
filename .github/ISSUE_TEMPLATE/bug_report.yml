name: Bug report
description: Report a bug in data-aggregator-mcp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** report security vulnerabilities here —
        see [SECURITY.md](../SECURITY.md) for private disclosure.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: Which tool?
      multiple: true
      options:
        - search
        - resolve
        - fetch
        - operate
        - list_sources
        - not sure
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Data source involved
      description: e.g. Zenodo, DataCite, NCBI/SRA, GEO, OmicsDI, DataONE, PubMed/OpenAIRE, HuggingFace.
      placeholder: "zenodo"
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show data-aggregator-mcp` (or the version `uvx` pulled).
      placeholder: "0.20.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact tool call and arguments. Include the input you fed it.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / errors{} payload
      description: Paste the error, traceback, or the per-source `errors{}` content.
      render: shell
    validations:
      required: false
